<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <h1>List of Products</h1>

<table>
    <tr>
        <td>Id</td>
        <td>Name</td>
        <td>Price</td>
        <td>Customer</td>
    </tr>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}">123</td>
        <td th:text="${product.name}">Item</td>
        <td th:text="${product.price}">321</td>
        <td th:text="${product.customer.userName}">user name</td>
    </tr>
</table>

</body>
</html>
